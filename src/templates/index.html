<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emotion Analyzer AI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>🤖 Emotion Analyzer AI</h1>
        <p class="subtitle">Analyze emotions: Happy, Sad, Angry, Anxious, Excited & more</p>
        
        <div class="input-section">
            <textarea id="textInput" placeholder="Type or paste your text here..."></textarea>
            <button id="analyzeBtn" onclick="analyzeEmotion()">Analyze Emotion</button>
        </div>
        
        <div id="alertBox" class="alert-box hidden"></div>
        <div id="result" class="result hidden">
            <div class="emotion-display">
                <span id="emotionIcon" class="emotion-icon"></span>
                <h2 id="emotionText"></h2>
            </div>
            <div class="confidence">
                <p>Confidence: <span id="confidenceText"></span></p>
                <div class="progress-bar">
                    <div id="progressFill" class="progress-fill"></div>
                </div>
            </div>
        </div>
        
        <div id="loading" class="loading hidden">
            <div class="spinner"></div>
            <p>Analyzing emotion...</p>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
